name: Neon Preview Branch

# Gives every pull request its own isolated Neon database branch and builds the
# Vercel preview deployment against it. Vercel's own Git build for previews is
# skipped via the `ignoreCommand` in vercel.json, so this workflow is the sole
# source of preview deployments. The branch is torn down by neon-cleanup.yml
# when the PR is closed or merged.

on:
  pull_request:
    types: [opened, reopened, synchronize]

# One preview deploy per PR at a time; a new push cancels the in-flight one.
concurrency:
  group: neon-preview-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  # Non-secret Vercel identifiers (from `vercel link`). Letting the CLI auto-link.
  VERCEL_ORG_ID: team_km2KV05NZUVZKhhbloC63K1g
  VERCEL_PROJECT_ID: prj_OAxJR66Mhgd7495VacHwxdQalRBc
  NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
  NEON_BRANCH: preview/pr-${{ github.event.number }}

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Branches off the Neon project's default branch, inheriting its schema and
      # data so previews behave like production but in full isolation.
      - name: Create Neon branch
        id: neon
        uses: neondatabase/create-branch-action@72ed4f69a12b6be9c16aebfad893f6a21e9aba8b # v6.4.0
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch_name: ${{ env.NEON_BRANCH }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel preview env
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      # `vercel pull` writes the prod DATABASE_URL into the preview env file.
      # Repoint it at this PR's Neon branch so the build (which runs
      # `prisma migrate deploy && next build`) migrates and builds against it.
      - name: Point the build at the Neon branch
        env:
          POOLED: ${{ steps.neon.outputs.db_url_pooled }}
          DIRECT: ${{ steps.neon.outputs.db_url }}
        run: |
          ENVFILE=.vercel/.env.preview.local
          {
            grep -vE '^(DATABASE_URL|DATABASE_URL_UNPOOLED)=' "$ENVFILE" || true
            echo "DATABASE_URL=\"$POOLED\""
            echo "DATABASE_URL_UNPOOLED=\"$DIRECT\""
          } > "$ENVFILE.tmp"
          mv "$ENVFILE.tmp" "$ENVFILE"

      - name: Build
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url_pooled }}
          DATABASE_URL_UNPOOLED: ${{ steps.neon.outputs.db_url }}
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      # `--prebuilt` uploads .vercel/output and skips the build (and the
      # ignoreCommand). `-e` sets this deployment's runtime DB to the branch,
      # overriding the project's prod DATABASE_URL for this preview only.
      - name: Deploy preview
        id: deploy
        env:
          POOLED: ${{ steps.neon.outputs.db_url_pooled }}
          DIRECT: ${{ steps.neon.outputs.db_url }}
          PR_NUMBER: ${{ github.event.number }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          url=$(vercel deploy --prebuilt --archive=tgz \
            -e DATABASE_URL="$POOLED" \
            -e DATABASE_URL_UNPOOLED="$DIRECT" \
            -m pr="$PR_NUMBER" \
            --token="$VERCEL_TOKEN" | tail -n1)
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on the PR
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
          BRANCH: ${{ env.NEON_BRANCH }}
        with:
          script: |
            const marker = '<!-- neon-preview -->';
            const body = [
              marker,
              '### Preview deployment',
              '',
              `🔗 **Preview:** ${process.env.PREVIEW_URL}`,
              `🌿 **Neon branch:** \`${process.env.BRANCH}\` (deleted automatically when this PR closes)`,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
